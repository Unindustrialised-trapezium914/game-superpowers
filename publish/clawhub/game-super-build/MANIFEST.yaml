bundle: game-super-build
bundle_version: 1.1.1
bundle_date: 2026-03-30
description: >
  Use as the top-level orchestration skill for serious game work. It decides project state, locks concept and scope, chooses an AI-native build mode, sets the quality target, and routes the rest of the workflow. This is the main “skills of skills” entry point.
compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
    capabilities:
      - local filesystem access
      - markdown skill bundles
      - reusable game-development workflows
  tested_on:
    - platform: OpenClaw
      surface: ClawHub
      status: pending
      date: 2026-03-30
    - platform: Claude Code
      surface: CLI
      status: pass
      date: 2026-03-30
    - platform: Codex
      surface: CLI
      status: pass
      date: 2026-03-30
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata
